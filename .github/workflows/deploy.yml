name: Deploy to Hostinger

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install sshpass and rsync
        run: sudo apt-get install -y sshpass rsync

      - name: Deploy via rsync over SSH
        env:
          SSHPASS: ${{ secrets.SFTP_PASSWORD }}
        run: |
          sshpass -e rsync -avz --delete \
            --exclude='.git*' \
            --exclude='.github/' \
            --exclude='CLAUDE.md' \
            --exclude='*.md' \
            --exclude='*.jsonl' \
            -e "ssh -p ${{ secrets.SFTP_PORT }} -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:/home/u260300169/domains/fluent-fox.site/public_html/
